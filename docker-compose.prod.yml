services:
  api:
    ports: []
    restart: unless-stopped

  worker:
    restart: unless-stopped

  redis:
    ports: []
    restart: unless-stopped

  db:
    ports: []
    restart: unless-stopped

  nginx:
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
      - ./deploy/certbot/www:/var/www/certbot:ro
      - ./deploy/certbot/conf:/etc/letsencrypt:ro
    restart: unless-stopped
