services:
  api:
    build: .
    env_file:
      - .env
    volumes:
      - ./media:/app/media
    depends_on:
      - db
      - redis
    ports:
      - "8000:8000"
    command: > 
      sh -c "alembic upgrade head && gunicorn -k uvicorn.workers.UvicornWorker -c gunicorn_conf.py app.main:app"

  db:
    image: postgres:16-alpine
    env_file:
      - .env
    ports:
      - "5432:${POSTGRES_PORT}"
    volumes:
      - db_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}

  worker:
    build: .
    env_file:
      - .env
    depends_on:
      - redis
      - db
    command: "celery -A app.tasks.celery_app:celery_app worker --loglevel=info"

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - api
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"


volumes:
  db_data: